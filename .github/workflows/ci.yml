name: ci
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: go vet ./...
      - run: go test -v ./...
      - name: coverage gate (100%)
        run: |
          go test -covermode=atomic -coverprofile=cov.out ./...
          pct=$(go tool cover -func=cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }
      - run: go test -run '^$' -fuzz FuzzCount -fuzztime 20s ./...
  emulated:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie", qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie", qemu: "" }
          - { arch: s390x,   image: "debian:trixie", qemu: "" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} go test -c -cover -o /tmp/t.test .
      - run: |
          cpu=""
          [ -n "${{ matrix.qemu }}" ] && cpu="-e QEMU_CPU=${{ matrix.qemu }}"
          docker run --rm --platform linux/${{ matrix.arch }} $cpu -v /tmp:/t ${{ matrix.image }} /t/t.test -test.v -test.coverprofile=/t/cov.out
      - name: coverage gate (100%)
        run: |
          pct=$(go tool cover -func=/tmp/cov.out | awk '/^total:/{print $3}')
          echo "coverage=$pct"
          [ "$pct" = "100.0%" ] || { echo "coverage below 100%"; exit 1; }

  # POWER8 ISA-guard lane. The `emulated` ppc64le job runs the default (POWER9-ish)
  # QEMU model, so an ISA-3.0 op illegal on POWER8 (LXVB16X/STXVB16X/CNTTZD) slips
  # through there and only SIGILLs on a real POWER8 (cfarm112). This lane runs the
  # SAME ppc64le test binary under QEMU_CPU=power8 (qemu-user honors QEMU_CPU;
  # power8 == power8e == power8_v2.0): if a VSX kernel emits an ISA-3.0 op without a
  # POWER9 dispatch gate, it SIGILLs here. No 100% coverage gate: on POWER8 a
  # properly-gated kernel takes the scalar fallback (kernel branch uncovered);
  # coverage is enforced by the `emulated` lane. The contract here is "must not
  # SIGILL on POWER8".
  emulated-ppc64le-power8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with: { go-version: stable }
      - run: docker run --privileged --rm tonistiigi/binfmt --install all
      - run: CGO_ENABLED=0 GOOS=linux GOARCH=ppc64le go test -c -cover -o /tmp/t.test .
      - name: run ppc64le binary on POWER8 (must not SIGILL)
        run: docker run --rm --platform linux/ppc64le -e QEMU_CPU=power8 -v /tmp:/t debian:trixie /t/t.test -test.v
